# ZRAM-optimized VM tunables for 8 GB laptop with GNOME
#
# These match the settings used by ChromeOS, Android, and Fedora Workstation
# for systems with zram swap enabled.

# Prefer swapping to zram over dropping page cache. Values above 100 are
# meaningful with zram — the kernel weighs "swap to compressed RAM" against
# "evict file pages", and 180 tells it zram is cheap (which it is).
vm.swappiness = 180

# Disable watermark boosting — it causes unnecessary background reclaim
# on zram systems where swap-in is nearly free.
vm.watermark_boost_factor = 0

# Wake kswapd earlier (1.25% of RAM ≈ 100 MB on 8 GB) so reclaim starts
# before the system hits direct reclaim stalls under GNOME's allocations.
vm.watermark_scale_factor = 125

# Disable swap readahead. zram is random-access; reading adjacent pages
# just wastes decompression cycles.
vm.page-cluster = 0
