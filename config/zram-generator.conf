# ZRAM swap — tuned for 8 GB Surface Laptop 2 running GNOME
#
# Creates a single compressed swap device backed by RAM.
# zstd gives the best compression ratio; 8 GB zram with ~3:1 compression
# yields ~24 GB effective swap without touching the SSD.

[zram0]
zram-size = ram
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
